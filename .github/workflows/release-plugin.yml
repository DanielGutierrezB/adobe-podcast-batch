name: Release del plugin (ZXP)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build ZXP
        run: bash scripts/build-zxp.sh
      - name: Crear release con el ZXP
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zxp
          generate_release_notes: true
