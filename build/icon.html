<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0;background:transparent}
  svg{display:block}
</style></head>
<body>
<svg id="icon" width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7b6cff"/>
      <stop offset="1" stop-color="#5a49e6"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eae7ff"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#2a1f6b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- fondo squircle -->
  <path d="M512 40
    C 250 40, 40 250, 40 512
    C 40 774, 250 984, 512 984
    C 774 984, 984 774, 984 512
    C 984 250, 774 40, 512 40 Z" fill="url(#bg)"/>

  <!-- micrófono -->
  <g filter="url(#sh)">
    <rect x="432" y="250" width="160" height="330" rx="80" fill="url(#wave)"/>
    <path d="M338 520 a174 174 0 0 0 348 0" fill="none" stroke="#ffffff" stroke-width="42" stroke-linecap="round"/>
    <rect x="492" y="694" width="40" height="86" rx="20" fill="#ffffff"/>
    <rect x="410" y="770" width="204" height="40" rx="20" fill="#ffffff"/>
  </g>

  <!-- ondas de sonido -->
  <g stroke="#ffffff" stroke-linecap="round" fill="none" opacity="0.92">
    <path d="M250 430 q-26 82 0 164" stroke-width="30"/>
    <path d="M774 430 q26 82 0 164" stroke-width="30"/>
    <path d="M188 388 q-40 124 0 248" stroke-width="26" opacity="0.55"/>
    <path d="M836 388 q40 124 0 248" stroke-width="26" opacity="0.55"/>
  </g>
</svg>
</body>
</html>
