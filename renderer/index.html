<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adobe Podcast Batch</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">🎙️ <span>Adobe Podcast Batch</span></div>
    <div class="conn" id="conn">
      <span class="dot" id="dot"></span>
      <span id="connText">Desconectado</span>
      <button id="connectBtn" class="btn small">Conectar con Adobe</button>
    </div>
  </header>

  <main>
    <section class="panel">
      <h2>Voz limpia</h2>
      <div class="sliders">
        <div class="slider-row">
          <label>Nivel de limpieza <span class="val" id="cleanVal">80%</span></label>
          <input type="range" id="cleanVoice" min="0" max="100" value="80" />
        </div>
      </div>
      <p class="hint" id="cleanHint"></p>
    </section>

    <section class="panel">
      <div class="actions">
        <button id="addFiles" class="btn">＋ Agregar audios</button>
        <button id="addFolder" class="btn">📁 Agregar carpeta</button>
        <div class="spacer"></div>
        <button id="clearBtn" class="btn ghost">Limpiar</button>
        <button id="openFolderBtn" class="btn ghost" style="display:none">📂 Abrir carpeta</button>
        <button id="stopBtn" class="btn ghost" style="display:none">■ Detener</button>
        <button id="startBtn" class="btn primary" disabled>▶ Procesar</button>
      </div>
      <div id="limitBanner" class="banner" style="display:none">
        ⏳ <span id="limitText">Sin créditos de Adobe. Esperando…</span>
      </div>
      <div class="queue-head">
        <span id="queueCount">0 archivos</span>
        <div class="progress"><div class="bar" id="overallBar"></div></div>
      </div>
      <ul class="queue" id="queue"></ul>
      <div class="drop-hint" id="dropHint">Arrastrá audios o una carpeta acá</div>
    </section>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
